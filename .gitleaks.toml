# gitleaks allowlist for the ocu-control repository.
#
# No real credentials are committed. There are no documented false positives
# yet: the control plane custodies the Storage-JWT signing key as a runtime
# secret MOUNT, never an in-tree value, and ships no example credential. Add
# an entry here only for a publicly-known, non-authenticating example value,
# scoped as tightly as possible (regex on the exact value, confined to the
# doc file that uses it).

[allowlist]
  description = "No documented false positives; see header."
  # Default gitleaks behaviour: extend (not replace) the built-in ruleset.
