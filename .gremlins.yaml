#
# go-gremlins mutation-testing configuration. Auto-discovered at the module
# root by `gremlins unleash` (and by `make mutation` and the mutation CI job),
# so the scope lives here in one place instead of being duplicated across the
# command lines.
#
# Scope: the pure-logic leaf packages where mutation testing has the highest
# signal and the suite is fast — the admission matrix, the row-as-reservation
# registry and quota gate, and the kill-switch / denylist engine. The
# runtime-provider, control-channel, and state-store packages are deliberately
# excluded: they need a live container backend and a live socket, which would
# make a mutation run enormous for little added signal over their own
# integration suites.
#
# coverpkg and the command-line path argument must stay in agreement.
#
# Schema reference: https://github.com/go-gremlins/gremlins
unleash:
  coverpkg: ./internal/admission/...,./internal/registry/...,./internal/quota/...,./internal/killswitch/...
  # Thresholds are 0 (advisory) and MUST stay there with gremlins: this tool is
  # structurally blind on THIS module and reports a phantom 0% efficacy / 0%
  # mutant-coverage (every mutant "Not covered") regardless of how strong the
  # suite is. Promoting the gate to blocking on that phantom would be a FALSE
  # ratchet — green-looking but enforcing nothing.
  #
  # Root cause (verified, gremlins-side, Go-version-independent): gremlins
  # v0.6.0's internal modPkg() reads ONLY THE FIRST LINE of go.mod and strips a
  # "module " prefix, instead of parsing with x/mod/modfile. This module's go.mod
  # opens with a license/SPDX comment, so gremlins takes that comment as the
  # module path; the coverage-profile filename keys then never get the module
  # prefix stripped while the mutation engine keys by WalkDir-relative paths, so
  # the position lookup misses on every mutant and all are scored "Not covered".
  # (Proof: moving `module ...` to go.mod line 1 flips a mutant from Not-covered
  # to Timed-out — it actually runs. We do NOT reorder go.mod for a tool bug.)
  #
  # Ratchet plan (Phase-7, per-plan): replace gremlins with avito-tech/go-mutesting,
  # which builds clean and scores honestly on this toolchain. Its terminology is
  # INVERTED (PASS = mutant killed, FAIL = mutant survived) and it has no built-in
  # threshold, so wrap it in a score-floor CI check. Once go-mutesting reports a
  # real efficacy floor on the security-core packages, arm THAT gate blocking —
  # never this gremlins gate.
  threshold:
    efficacy: 0
    mutant-coverage: 0
