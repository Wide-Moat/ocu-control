name: Feature Request
description: Propose a new capability or improvement.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, check whether an architecture decision
        record (ADR) in `Wide-Moat/open-computer-use` already addresses the
        area. Design changes must originate there, not here.

        **Scope note:** the agent loop and model choice live in the calling
        client, not in the control plane; the admin web UI is a v1 non-goal.
        Feature requests touching those areas should reference the relevant ADR
        or roadmap item rather than proposing an implementation here.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: >
        What limitation or gap does this address? Describe the concrete
        use-case, not the solution.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: >
        How would you solve the problem? Include any interface or behavioral
        changes you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why you ruled them out.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: >
        Links to relevant ADRs, NFR rows, or external references.
