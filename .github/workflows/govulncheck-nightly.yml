name: govulncheck-nightly

# govulncheck scans the module graph against the Go vulnerability database
# (T2-10, SUPPLY-03). It runs here as a SCHEDULED job rather than a per-PR gate:
# `govulncheck -mode binary` works correctly in isolation (~2s, the five waived
# docker advisories reachable) but its process intermittently survives both the
# inner and an outer `timeout` when run as a synchronous PR step under `bash -e`,
# wedging the PR job until the step timeout (ocu-control#6 — the scan is healthy,
# the runner's PR-step process-reap is not). A nightly schedule has no PR-step
# reap interaction: it does not block merge, it owns its whole runner, and a hang
# fails the scheduled run loudly without holding a PR hostage. The reachability
# waiver, the strip-guard, and the RED-when-neutered red-probe are carried over
# 1:1 from the PR job — this is a MOVE of the gate, NOT a weakening: the same
# vuln.go.dev DB, the same waiver logic, the same fail-closed-on-empty posture.
#
# The waiver (scripts/govulncheck-waiver.sh) fails on any reachable, non-waived
# finding AND on any waived ID that vanishes (upstream fix landed -> the waiver is
# dead and must be removed). It currently covers five docker/docker@v28.5.2
# advisories with no upstream fix; see issue #6 for the IDs, the RuntimeProvider
# reachability path, and the review-by date. The red-probe proves the gate reds
# when neutered (the same six Skeptics the PR job ran alongside it).
#
# PORTING (this file is the fleet reference for the govulncheck-hang class — any
# Go 1.26 repo whose synchronous PR-step govulncheck wedges should copy it). Three
# points are repo-specific and MUST be adjusted, everything else is verbatim:
#   1. The build target + binary name: `./cmd/<your-main>` -> `<your>-gatescan`
#      below, and the matching OCU_GATE_BINARY in the final step. Keep it UNSTRIPPED
#      (no -ldflags='-s -w') — binary mode needs the symbol table.
#   2. The waiver script's waived-ID set + the issue reference: each repo carries
#      its own reachable, no-upstream-fix advisories and its own tracking issue.
#   3. The red-probe's fixtures, if the waived set differs (its control case must
#      list this repo's actual waived IDs, or Skeptic D goes red on a real run).
# The schedule, the move-not-weaken rationale, the egress probe, and the
# fail-closed posture port unchanged.

on:
  schedule:
    # 07:13 UTC daily — an off-the-hour minute so the run does not pile onto the
    # top-of-hour scheduler surge (which delays and occasionally drops cron runs).
    - cron: '13 7 * * *'
  # Manual trigger so the gate can be exercised on demand (e.g. right after a
  # dependency bump) without waiting for the nightly slot.
  workflow_dispatch: {}
  # Also scan on every push to main, so a merge that introduces a reachable
  # non-waived advisory is caught at integration time, not only the next night.
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: govulncheck-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    # A backstop well above the isolated-scan time (~2s) so a genuine runner-side
    # stall fails loudly rather than burning the GitHub default 360min, while
    # leaving ample headroom over the waiver + red-probe + egress probe.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: install govulncheck (pinned)
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      # Build an UNSTRIPPED controld for binary-mode govulncheck to scan. The waiver
      # script runs `govulncheck -mode binary` (NOT a source scan: the source scan's
      # go-toolchain fork wedges on go 1.26 — issue #6). Binary mode needs symbols, so
      # this build MUST NOT pass -ldflags='-s -w' (default `go build` keeps the symbol
      # table + DWARF). The waiver script's strip-guard fails closed if the binary is
      # ever stripped, so a future -s -w here is caught, not silently fail-open.
      - name: build an unstripped controld for the binary-mode scan
        run: CGO_ENABLED=0 go build -trimpath -o ocu-controld-gatescan ./cmd/ocu-controld
      - name: govulncheck waiver red-probe (RED-when-neutered)
        run: bash scripts/govulncheck-waiver-redprobe.sh
      # Diagnostic only (never fails the job): probe runner egress to the vuln DB
      # host. A fast curl success means egress is fine and a hang is a transient
      # stall; a curl timeout/failure means the runner cannot reach the DB at all,
      # so a govulncheck fail-closed is correct, not a flake. Bounded so the
      # diagnostic itself cannot hang the job.
      - name: probe vuln-DB egress (diagnostic, non-blocking)
        run: |
          echo "Probing egress to the Go vulnerability DB host (diagnostic only):"
          curl -sS --max-time 20 -o /dev/null -w "vuln.go.dev HTTP %{http_code} in %{time_total}s\n" \
            https://vuln.go.dev/index/db.json 2>&1 || echo "vuln.go.dev unreachable or timed out within 20s (runner egress to the vuln DB host is likely blocked)"
      - name: govulncheck (waiver-gated, issue #6)
        env:
          OCU_GATE_BINARY: ${{ github.workspace }}/ocu-controld-gatescan
        run: bash scripts/govulncheck-waiver.sh
