name: deadcode

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deadcode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deadcode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: install deadcode
        # Pin the exact version: a floating tool version could flip this gate
        # red/green between two runs of the same commit (T-07-01).
        run: go install golang.org/x/tools/cmd/deadcode@v0.38.0 # golang.org/x/tools/cmd/deadcode
      - name: deadcode gate (whole-program, incl. tests)
        run: bash scripts/deadcode-gate.sh
      # RED-when-neutered proof: plant a dead export, assert the gate fires, remove
      # it, assert the gate is green. A gate that never fires guards nothing; this
      # proof runs in CI (not just locally) so a neutered gate cannot ship green.
      - name: deadcode red-probe (gate fires on a planted dead export)
        run: bash scripts/deadcode-redprobe.sh
