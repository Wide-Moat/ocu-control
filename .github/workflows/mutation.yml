name: mutation

# GATE 3 (QUAL-03): the mutation-test score floor — a BLOCKING gate on assertion
# strength. Mutation testing rewrites covered source (a `+` becomes a `-`, a `>`
# becomes a `>=`, a condition is negated) and re-runs the suite; a mutant the
# tests still pass on is a line the suite executes but does not assert on — a gap
# line coverage cannot see. The gate is scoped to the pure-logic leaf packages
# where the signal is highest and the suite is fast: admission, killswitch, quota,
# registry.
#
# The tool is avito-tech/go-mutesting, NOT go-gremlins. go-gremlins is structurally
# blind on this module: it reads the module name from go.mod line 1, which here is
# the SPDX comment, so every mutant scored "Not covered" — a phantom 0%. Promoting
# a gremlins gate to blocking would enforce nothing. go-mutesting builds and mutates
# correctly on this toolchain, so the gate is promoted on it; the unfreeze trigger
# was always "go-mutesting green", never "gremlins fixes parsing".
#
# go-mutesting has inverted terminology (PASS = mutant killed = good), no built-in
# threshold, and exits 0 regardless of score, so scripts/mutation-floor.sh parses
# the score line and fails below a per-package floor — and fails CLOSED on a
# no-score run (the anti-gremlins guard: a tool that "passes" by mutating nothing
# is a failure, not a pass). This job is BLOCKING (no continue-on-error): a
# regression in assertion strength below floor fails the merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly, Monday 03:00 UTC — a drift canary that keeps the score visible even
    # when no PR has run it recently.
    - cron: '0 3 * * 1'

permissions:
  contents: read

concurrency:
  # This is the longest-running blocking gate (six packages of serial
  # go-mutesting; cred alone is 117 mutants under GOMAXPROCS=1). A superseded-SHA
  # verdict has NO merge value — the pre-merge gate reads the HEAD SHA's
  # check-runs only, so a mutation result for a force-pushed-over commit is dead
  # weight that keeps the concurrency slot for hours and delays the fresh HEAD's
  # required run. Cancel it. The short blocking jobs (go.yml and kin) keep
  # cancel-in-progress:false: slot-holding is immaterial when the job is quick, so
  # letting a superseded short run finish costs nothing and the symmetry churn of
  # flipping them is not worth it.
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: install go-mutesting
        # No semver tag exists upstream, so the commit pseudo-version IS the pin
        # (commit 48d0401f00fb). go install resolves it to that immutable commit
        # via the checksum database (T-07-08).
        run: go install github.com/avito-tech/go-mutesting/cmd/go-mutesting@v0.0.0-20251226130216-48d0401f00fb
      - name: mutation score floor (blocking)
        run: bash scripts/mutation-floor.sh
      # RED-when-neutered proof: assert the below-floor decision and the no-score
      # (anti-gremlins) guard both fire. A gate that never fires below floor guards
      # nothing; this proof runs in CI (not just locally) so a neutered floor gate
      # cannot ship green.
      - name: mutation red-probe (floor and no-score guards fire)
        run: bash scripts/mutation-redprobe.sh
