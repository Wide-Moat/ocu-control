name: e2e

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # build-controld builds the static control daemon and publishes it as a
  # same-run artifact. The e2e job consumes it via needs: +
  # download-artifact@v4 IN THE SAME RUN — no run-id/token cross-workflow
  # mode (that is the race-prone anti-pattern and is NOT used).
  build-controld:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: static build of ocu-controld
        run: CGO_ENABLED=0 go build -trimpath -o ocu-controld ./cmd/ocu-controld
      - name: upload the control daemon binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ocu-controld
          path: ocu-controld
          if-no-files-found: error
          retention-days: 1

  # e2e is the RELEASE-GATING job: it exercises the REAL daemon binary —
  # no mocks. It is a REQUIRED check — no continue-on-error. Today the
  # daemon is a scaffold that validates its flag surface and refuses with a
  # typed error; the smoke below asserts exactly that observable behaviour.
  # The Integration|E2E test slice grows with the lifecycle implementation
  # PRs (real ingress listeners, host-dialled control channel, teardown
  # finalizer) and runs under this same job.
  e2e:
    runs-on: ubuntu-latest
    needs: build-controld
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: download the control daemon binary (same run)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ocu-controld
      - name: make the control daemon binary executable
        run: chmod +x ocu-controld
      - name: smoke — the real daemon refuses bad invocations pre-bind
        # All four pre-bind refusals (missing required flag, unknown
        # runtime-tier, unknown runtime-provider, create-before-bind naming
        # NFR-SEC-01) live in ONE committed script so e2e and release assert
        # the SAME invariants against the SAME binary, never drifting YAML
        # copies.
        run: bash scripts/e2e-smoke.sh ./ocu-controld
      - name: run the Integration + E2E slice
        env:
          OCU_CONTROL_BIN: ${{ github.workspace }}/ocu-controld
        run: go test -run 'Integration|E2E' ./... -v -timeout 600s

  # docker-build catches go.mod / Dockerfile toolchain drift on every PR and
  # push to main — the class of bug where go.mod advances past the builder
  # image's Go version, causing `go mod download` to fail inside the container.
  # A single-arch linux/amd64 build is sufficient to catch the mismatch fast;
  # the full multi-platform push happens in release.yml. This job must never
  # push (no registry credentials are supplied or needed).
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: build the control image (no push — toolchain mismatch gate)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          push: false
