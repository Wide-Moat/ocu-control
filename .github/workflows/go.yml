name: go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: go-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gofmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: gofmt -l (fail on any unformatted file)
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi
          echo "gofmt clean"

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: go vet
        run: go vet ./...

  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: install staticcheck
        # Pin to the exact commit the 2026.1 tag points to, not the bare
        # calendar tag: govulncheck/cosign pin exact versions, and the bare
        # 2026.1 tag would float onto later 2026.1.x patches so a rule change
        # could flip this lint gate red/green between two runs of the same
        # commit. The 2026.1 release ships no separate patch tag yet, so the
        # immutable commit SHA is the tightest pin available.
        run: go install honnef.co/go/tools/cmd/staticcheck@5a501ea53df483ea698b8a046cd3a8e8b6ae7620 # 2026.1
      - name: staticcheck
        run: staticcheck ./...

  # golangci runs the structural meta-linter (.golangci.yml): the security and
  # correctness set (gosec, errorlint, bodyclose, ...) that the single-purpose
  # jobs above do not cover. staticcheck/vet are also re-run by it for local
  # parity but their authoritative gate is their own job. Pinned to the same
  # tool version `make lint` installs so a finding never flips between the two.
  golangci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: golangci-lint
        # The action is pinned to the dereferenced commit SHA of its v8.0.0
        # release (v8 tracks golangci-lint v2). The `version` input pins the
        # tool itself to an exact release so the gate is reproducible — a bare
        # tag would float onto later patches and could flip a rule red/green
        # between two runs of the same commit.
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    # The same throwaway Postgres as the coverage job, so the state.Store
    # Postgres conformance + durability legs run for real here too (advisory
    # locks, restart-reload, the guarded-INSERT charge SQL) instead of
    # live-skipping. Without OCU_TEST_DATABASE_URL those legs skip cleanly.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ocu_control_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d ocu_control_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: go test
        env:
          OCU_TEST_DATABASE_URL: postgres://test:test@127.0.0.1:5432/ocu_control_test?sslmode=disable
        run: go test ./...

  # race runs the whole suite under the race detector (T1-14): the daemon is
  # concurrency-heavy (admission gate, per-session supervisor, host-dialled
  # channels, signal-driven shutdown), so a silent data race is a correctness
  # hole the plain test job cannot see. The Postgres advisory-lock paths are
  # exercised under -race against a real engine here; gated real-binary e2e
  # skips exactly as it does in the test job.
  race:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ocu_control_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d ocu_control_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: go test -race
        env:
          OCU_TEST_DATABASE_URL: postgres://test:test@127.0.0.1:5432/ocu_control_test?sslmode=disable
        run: go test -race ./... -timeout 600s

  coverage:
    runs-on: ubuntu-latest
    # A throwaway Postgres backs the state.Store integration leg so the
    # Postgres implementation's lines are actually executed in the coverage
    # measurement (without it the pg leg live-skips and reads as 0%, deflating
    # the number and hiding a regression in postgres.go). The same service is
    # what the conformance suite dials via OCU_TEST_DATABASE_URL.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ocu_control_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d ocu_control_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      # Gate the production internal/ packages — the control plane's real logic.
      # The cmd/ wrapper is thin and deliberately excluded, and so is
      # internal/state/statetest (a test-support package whose t.Fatalf error
      # branches never run on a green pass and would deflate the denominator).
      # The floor is floor(first-measured)-1 = 91 and ratchets up; it never
      # decreases.
      - name: collect coverage (production internal packages, Postgres live)
        env:
          OCU_TEST_DATABASE_URL: postgres://test:test@127.0.0.1:5432/ocu_control_test?sslmode=disable
        run: |
          set -euo pipefail
          pkgs=$(go list ./internal/... | grep -v '/statetest')
          coverpkg=$(echo "$pkgs" | paste -sd, -)
          go test -coverpkg="$coverpkg" -coverprofile=cover.out $pkgs -timeout 600s -count=1
      - name: enforce the line-coverage floor
        run: |
          set -euo pipefail
          total=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          # floor(first-measured)-1; ratchet up as coverage improves, never down.
          floor=91
          awk -v t="${total:-0}" -v f="$floor" 'BEGIN {
            if (t+0 < f+0) { printf "::error::go internal coverage %.1f%% below floor %.1f%%\n", t, f; exit 1 }
            printf "go internal coverage %.1f%% >= floor %.1f%%\n", t, f
          }'
      - name: upload the coverage profile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage-profile
          path: cover.out

  # NOTE: the govulncheck job moved OUT of this per-PR pipeline into the standalone
  # workflow .github/workflows/govulncheck-nightly.yml (scheduled + push:[main]),
  # so a reachable non-waived advisory is still caught at merge-integration time.
  # This is a MOVE of the gate, NOT a removal: the same vuln.go.dev DB, the same
  # waiver + strip-guard + 6-Skeptic red-probe, fail-closed-on-empty intact.
  # SUPPLY-03 coverage is preserved. The "hang" that motivated the move was
  # root-caused later (issue #6): a quadratic bash pattern substitution in the
  # waiver script's non-emptiness check spinning >20 minutes on the ~540 KB scan
  # stream — never the scan, timeout/setsid, or the runner. The check is an O(n)
  # glob match now; the nightly placement is kept as the chosen depth.

  # schema is the structural-validity gate for every contract this repo carries,
  # distinct from the byte-identity gate below. It compiles the vendored
  # JSON-Schema contracts with ajv, lints the draft OpenAPI 3.1 surfaces this repo
  # defines (#205) with redocly, and lints the draft session-setup proto with buf.
  # A contract that no longer parses (a bad re-vendor, a malformed $ref, a broken
  # OpenAPI ref, a proto lint regression) fails here even if the canon checkout is
  # absent — so a draft surface cannot rot before it is frozen upstream.
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # -c ajv-formats loads the format vocabulary so format:"date-time" (and the
      # other RFC formats the frozen schemas pin) is ASSERTED, not silently ignored.
      # Without it ajv drops every format keyword and the gate cannot catch a
      # timestamp-format drift in the published artifact.
      - name: ajv compile the vendored JSON-Schema contracts
        run: |
          npx --yes -p ajv-cli@5.0.0 -p ajv-formats@3.0.1 ajv compile --spec=draft2020 --strict=false -c ajv-formats \
            -s contracts/control/control-rpc.schema.json \
            -s contracts/exec/exec-channel.schema.json \
            -s contracts/storage/mount-config.schema.json \
            -s contracts/mcp/mcp-key-set.schema.json
      # The golden is pinned byte-for-byte to WriteKeySet's output by
      # TestWriteKeySetMatchesGolden, so validating it against the vendored canon
      # schema proves the published A2 artifact conforms to the frozen wire —
      # INCLUDING the RFC3339 date-time formats, now that ajv-formats is loaded.
      - name: ajv validate the A2 hashed-key-set golden against the canon schema
        run: |
          npx --yes -p ajv-cli@5.0.0 -p ajv-formats@3.0.1 ajv validate --spec=draft2020 --strict=false -c ajv-formats \
            -s contracts/mcp/mcp-key-set.schema.json \
            -d internal/mcpkeyset/testdata/mcp-key-set.golden.json
      # The draft operator-REST and SOAR-revoke surfaces (#205 define-surface).
      # The redocly config disables exactly two recommended-ruleset opinions that
      # conflict with sourced design choices (the host-local UDS surface declares
      # no servers block; the filesystem_id XOR memory_store_id not/required idiom),
      # documented in contracts/openapi/redocly.yaml — never an OpenAPI 3.1 rule.
      - name: redocly lint the draft OpenAPI surfaces
        run: |
          npx --yes @redocly/cli@1.34.2 lint --config contracts/openapi/redocly.yaml \
            contracts/openapi/operator-rest.openapi.yaml \
            contracts/openapi/soar-revoke.openapi.yaml
      # The draft session-setup gRPC surface (#205 define-surface). buf lint also
      # underpins the additive-only breaking-change gate the contract evolves under
      # (NFR-IC-04); this step keeps the proto lint-clean from commit one. buf is
      # the PINNED v1.34.0 release the canon contracts-lint job runs — fetched as a
      # release binary, so no third-party action is in the supply chain and the lint
      # ruleset is byte-identical to canon's. Pinning the exact version matters: the
      # category names changed across buf majors (the v1 `STANDARD` category is
      # unknown to a later line and would silently lint zero rules), so the gate must
      # run the same buf the canon freeze validated against.
      - name: buf lint the draft session-setup proto
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/buf \
            "https://github.com/bufbuild/buf/releases/download/v1.34.0/buf-$(uname -s)-$(uname -m)"
          chmod +x /tmp/buf
          cd contracts/proto
          /tmp/buf lint
          /tmp/buf build -o /dev/null

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Check out the canonical architecture repo so the byte-identity gate
      # actually enforces in CI; without this the script's skip branch would
      # make the gate dead on every runner.
      #
      # PIN the canon to the immutable commit SHA whose contracts/ tree is
      # byte-identical to our vendored copies (control-rpc, exec-channel,
      # mount-config, audit-fanin). Bump this SHA deliberately when
      # re-vendoring; verify byte-identity (cmp) before bumping. Keep it in
      # sync with the pinned revision recorded in
      # scripts/check-contract-identity.sh.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: Wide-Moat/open-computer-use
          # Kept in sync with scripts/check-contract-identity.sh's pinned revision:
          # 099d3d7 (next/v1 after PR #318 — the mcp-key-set A2 freeze), which the
          # newly vendored contracts/mcp/mcp-key-set.schema.json requires. All five
          # vendored contracts (control-rpc, exec-channel, mount-config,
          # audit-fanin, mcp-key-set) are byte-identical to canon @099d3d7
          # (verified by cmp). The prior pin was 5100e14 (PR #303 exec-uplift).
          ref: 099d3d76d6d8a8e5bec6f46b989c6b9a9246c375
          path: canon
      - name: SPDX header presence
        run: bash scripts/check-spdx.sh
      - name: maintainer identity
        run: bash scripts/check-doc-identity.sh
      - name: vendored contract identity
        env:
          OCU_CANON_DIR: canon
        run: bash scripts/check-contract-identity.sh
      - name: embedded seccomp profile pin
        run: bash scripts/check-seccomp-pin.sh
