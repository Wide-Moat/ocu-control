name: codeql

# First-party CodeQL dataflow analysis of the Go daemon. This is distinct from
# the semgrep SARIF upload in security.yml: that uploads a third-party SAST
# report into the Security tab, whereas this runs CodeQL's own taint/dataflow
# engine over the compiled module.
#
# ADVISORY, NON-BLOCKING — this is defense-in-depth, NOT a merge gate. The
# blocking SAST floor is the semgrep job in security.yml, which is a required
# status check on main. CodeQL runs on push-to-main and weekly, surfacing
# findings as code-scanning alerts in the Security tab; it deliberately carries
# NO pull_request trigger and is NOT a required status check, so its results
# inform but do not block merge. This keeps the workflow honest about its own
# role: a scan that looks like a gate (a PR trigger under required-checks
# scrutiny) without actually blocking is the worst of both worlds. If CodeQL is
# ever promoted to a blocking gate, do it with the native "Require code scanning
# results" branch-protection control (context `CodeQL`) — never a
# `result.level == "error"` fail-on step, which is vacuous because CodeQL places
# severity in `rule.properties.security-severity` and reports many
# security-relevant queries at level "warning".

on:
  push:
    branches: [main]
  schedule:
    # Weekly cron: Monday at 02:00 UTC. Offset one day from security.yml's
    # Sunday cron so the two scheduled scans do not contend for a runner.
    - cron: '0 2 * * 1'

permissions:
  contents: read
  security-events: write
  # CodeQL reads the workflow run metadata; required on private repos and
  # harmless on a public one.
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      # build-mode: manual with an explicit build below. Autobuild can miss
      # packages guarded by build tags; an explicit `go build ./...` compiles
      # every package the daemon ships so CodeQL extracts the whole module.
      # security-and-quality is the broadest query suite — appropriate for a
      # security-sensitive daemon.
      - name: initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: manual
          queries: security-and-quality
      - name: build (manual)
        run: CGO_ENABLED=0 go build ./...
      - name: analyze
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:${{ matrix.language }}"
