#
# ocu-control.conf — sysusers.d declaration for the control-plane service account.
#
# The systemd unit (contrib/systemd/ocu-controld.service) runs the daemon as
# User=ocucontrol / Group=ocucontrol. Nothing in the unit creates that account,
# so without this file the first start (or `systemctl enable --now`) fails
# user-not-found. systemd-sysusers — run by the package installer or by hand at
# install time — reads this file and provisions the system user and group the
# unit references.
#
# INSTALLATION (see the unit header for the full sequence):
#   cp contrib/sysusers.d/ocu-control.conf /etc/sysusers.d/
#   systemd-sysusers              # creates the ocucontrol system user + group
#
# The single declaration below is the canonical sysusers.d six-column format
#   type  name  id  gecos  home  shell
# type `u`  — create a system user AND, implicitly, a group of the same name;
#             the same-name group satisfies the unit's Group=ocucontrol.
# id   `-`  — let systemd pick a dynamic uid/gid in the system range.
# home/shell — /nonexistent and /usr/sbin/nologin pin a locked, non-login
#             service account: no home directory and no interactive login.
#
# The name MUST stay byte-identical to the unit's User=/Group=ocucontrol; a
# drift between the two is exactly the failure this file exists to prevent and
# is guarded by Test_SystemdUnit_SysusersUserMatches.
u  ocucontrol  -  "Open Computer Use control plane"  /nonexistent  /usr/sbin/nologin
